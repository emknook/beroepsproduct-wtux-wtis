<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav class="main-nav">
            <a class="logo" href="index.html"><img src="../img/Pizzeria.png" alt="Pizzeria logo"></a>

            <div class="nav-links">
                <a class="button">
                    Current order
                </a>
                <div class="expandable-button">
                    <a class="expandable-button__label" href="order.html">
                        Account
                    </a>
                    <div class="expandable-panel">
                        <div class="signin">
                            <label for="username">Username</label>
                            <input id="username" name="username" class="text-input">
                            <label for="password">Password</label>
                            <input id="password" name="password" class="text-input" type="password">
                        </div>
                        <div class="expandable-panel-actions">
                            <a href="./register.html">Register</a>
                            <a class="button" href="indexSignedIn.html">Sign in</a>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="content">
            <div class="border-form">
                <form>
                    <h1 class="form-title">Register profile</h1>
                    <div class="form-input-fields">
                        <label for="register-username">Username</label>
                        <input id="register-username" name="username" class="text-input" >
                        <label for="firstname">First name</label>
                        <input id="firstname" name="firstname" class="text-input">
                        <label for="lastname">Last name</label>
                        <input id="lastname" name="lastname" class="text-input">
                        <label for="register-password">Password</label>
                        <input id="register-password" name="password" class="text-input" type="password">
                        <label for="register-password-repeated">Password again</label>
                        <input id="register-password-repeated" name="register-password-repeated" class="text-input" type="password">
                    </div>
                    <a class="button submit-button" href="index.html">Register</a>
                </form>
            </div>
        </div>
    </main>

</body>
</html>
